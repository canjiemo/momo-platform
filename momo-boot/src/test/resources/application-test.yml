# =====================================================================
# 集成测试 Profile：连接本地 momo-platform-test 库与 Redis db=15
# 由 AbstractIntegrationTest 通过 @ActiveProfiles("test") 激活
# =====================================================================
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/momo-platform-test?stringtype=unspecified
    username: admin
    password: 123456
    druid:
      initial-size: 1
      min-idle: 1
      max-active: 5
      validation-query: SELECT 1
      filters: stat,wall

  data:
    redis:
      host: localhost
      port: 6379
      database: 15            # 测试独占 db=15，避免污染 dev/生产 db=0
      password:               # 本地 Redis 免密；显式置空覆盖父配置 application.yml 里的默认密码
      timeout: 3000ms

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false     # 测试库允许 clean，便于重置
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

server:
  port: 0                      # 随机端口，避免端口占用

jwt:
  secret: "test-secret-32chars-test-secret-32chars"
  expiration: 86400000

myjdbc:
  show-sql:
    enabled: true              # 打开方便定位 insert/update 失败
  tenant:
    enabled: false             # 第一批测试关闭多租户简化断言，多租户专项再单独开

logging:
  level:
    io.github.canjiemo.base.myjdbc: DEBUG
    org.springframework.jdbc: DEBUG
